name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"  # Weekly Monday 5am UTC

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Audit dependencies
        run: pip install pip-audit && pip-audit -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing tests/

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

      - name: Lint
        run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:coverage

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Check for Clerk secrets
        id: check-secrets
        run: |
          if [ -z "$CLERK_SECRET_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Clerk secrets not configured — skipping E2E tests"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - uses: pnpm/action-setup@v5
        if: steps.check-secrets.outputs.skip == 'false'
        with:
          version: latest

      - uses: actions/setup-node@v4
        if: steps.check-secrets.outputs.skip == 'false'
        with:
          node-version: "18"
          cache: pnpm

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.check-secrets.outputs.skip == 'false'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.check-secrets.outputs.skip == 'false'
        run: npx playwright test
        env:
          CI: "true"
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        if: failure() && steps.check-secrets.outputs.skip == 'false'
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  docker:
    name: Docker Build (Backend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t dualstack-api backend/

  docker-frontend:
    name: Docker Build (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Copy lockfile for Docker context
        run: cp pnpm-lock.yaml frontend/

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: dualstack-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_placeholder
            NEXT_PUBLIC_API_URL=http://localhost:8000
