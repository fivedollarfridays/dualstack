# Deployment Workflow — Staging and Production
#
# Staging:  Auto-deploys on merge to main (after CI passes)
# Production: Deploys on release/tag with manual approval gate
#
# GitHub Environment Setup Required:
#   1. Go to repo Settings > Environments
#   2. Create "staging" environment (no protection rules needed)
#   3. Create "production" environment:
#      - Add required reviewers (at least 1)
#      - Restrict deployment branches to "main" and tags matching "v*"
#   4. Add environment secrets for each (RENDER_API_KEY, etc.)
#
# Rollback Procedures:
#
#   Staging rollback:
#     git revert HEAD && git push origin main
#     # Or redeploy a previous commit via Render dashboard
#
#   Production rollback:
#     # Option 1: Deploy previous release tag
#     git checkout v1.0.0 && git push origin HEAD:main
#
#     # Option 2: Revert via Render dashboard
#     # Go to render.com > Service > Manual Deploy > select previous commit
#
#     # Option 3: Emergency — rollback Render deploy directly
#     curl -X POST "https://api.render.com/v1/services/$SERVICE_ID/rollback" \
#       -H "Authorization: Bearer $RENDER_API_KEY"
#
#   After any rollback:
#     1. Verify health: curl https://api.dualstack.app/health
#     2. Monitor Grafana dashboards for 15 minutes
#     3. Create a post-incident review if SEV1/SEV2

name: Deploy

# Disabled — self-hosting with Docker Compose.
# Re-enable when a managed deployment target (Render, Fly.io, etc.) is configured.
# See: https://github.com/fivedollarfridays/dualstack/issues/TBD
on:
  workflow_dispatch:  # manual-only until deployment target is configured

jobs:
  staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
    environment:
      name: staging
      url: https://staging.dualstack.app
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render (staging)
        run: |
          echo "Deploying to staging..."
          HTTP_CODE=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Render API returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Staging deploy triggered"

      - name: Wait for deploy and verify health
        run: |
          echo "Waiting for staging deploy to complete..."
          sleep "${{ vars.DEPLOY_WAIT_SECONDS || '30' }}"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ vars.STAGING_URL || 'https://staging.dualstack.app' }}/health/live" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "WARNING: Staging health check did not pass within timeout"
          exit 1

  production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    environment:
      name: production
      url: https://api.dualstack.app
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render (production)
        run: |
          echo "Deploying to production..."
          HTTP_CODE=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Render API returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Production deploy triggered"

      - name: Wait for deploy and verify health
        run: |
          echo "Waiting for production deploy to complete..."
          sleep "${{ vars.DEPLOY_WAIT_SECONDS || '60' }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ vars.PRODUCTION_URL || 'https://api.dualstack.app' }}/health/live" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "CRITICAL: Production health check did not pass within timeout"
          exit 1
