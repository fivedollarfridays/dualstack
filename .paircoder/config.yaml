project:
  name: dualstack
  primary_goal: DualStack is a production-ready FastAPI + Next.js SaaS starter kit
  coverage_target: 99
  description: dualstack project
workflow:
  main_branch: main
  context_dir: .paircoder/context
  default_branch_type: feature
  plans_dir: .paircoder/plans
  tasks_dir: .paircoder/tasks
models:
  navigator: claude-opus-4-6
  driver: claude-opus-4-6
  reviewer: claude-sonnet-4-6
  providers:
    anthropic:
      models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-sonnet-4-5
      - claude-haiku-4-5
      default_effort: medium
architecture:
  max_file_lines: 300
  max_function_lines: 40
  max_functions_per_file: 12
trello:
  board_id: 69a79da7cba422972e0cb33f
  board_name: DualStack
  enabled: true
  lists:
    backlog: Backlog
    sprint: Backlog
    in_progress: In Progress
    review: In Review
    done: Done
    blocked: Blocked
    ready: Backlog
  custom_fields:
    agent_task: Agent Task
    priority: Priority
  agent_identity: claude
  auto_sync: true
  defaults:
    project: dualstack
    stack: Worker/Function
    repo_url: ''
  board_structure:
    lists:
    - name: Intake/Backlog
      maps_to_status:
      - pending
      - backlog
    - name: Planned/Ready
      maps_to_status:
      - ready
      - planned
    - name: In Progress
      maps_to_status:
      - in_progress
    - name: Review/Testing
      maps_to_status:
      - review
      - testing
    - name: Deployed/Done
      maps_to_status:
      - done
      - deployed
    - name: Issues/Tech Debt
      maps_to_status:
      - blocked
      - issue
  labels:
  - name: Frontend
    color: green
    matches:
    - react
    - ui
    - frontend
    - css
  - name: Backend
    color: blue
    matches:
    - flask
    - api
    - backend
    - python
  - name: Worker / Function
    color: purple
    matches:
    - worker
    - function
    - background
    - async
    - cli
  - name: Deployment
    color: red
    matches:
    - deploy
    - ci
    - cd
    - infra
    - config
  - name: Bug / Issue
    color: orange
    matches:
    - bug
    - fix
    - issue
    - error
  - name: Documentation
    color: sky
    matches:
    - docs
    - documentation
    - readme
    - guide
  automation:
    on_task_ready:
      move_to_list: Planned/Ready
      set_status: Enqueued
    on_task_start:
      move_to_list: In Progress
      set_status: In progress
    on_task_review:
      move_to_list: Review/Testing
      set_status: Testing
    on_task_complete:
      move_to_list: Deployed/Done
      set_status: Done
    on_task_block:
      move_to_list: Issues/Tech Debt
      set_status: Blocked
version: 2.15.11
pack:
  default_name: agent_pack.tgz
  excludes:
  - .git
  - .venv
  - __pycache__
  - node_modules
  - dist
  - build
  - '*.log'
  - '*.bak'
routing:
  by_complexity:
    trivial:
      max_score: 20
      model: claude-haiku-4-5
    simple:
      max_score: 40
      model: claude-sonnet-4-6
    moderate:
      max_score: 60
      model: claude-sonnet-4-6
    complex:
      max_score: 80
      model: claude-opus-4-6
    epic:
      max_score: 100
      model: claude-opus-4-6
  overrides:
    security: claude-opus-4-6
    architecture: claude-opus-4-6
estimation:
  complexity_to_hours:
    xs:
      range:
      - 0
      - 15
      hours:
      - 0.5
      - 1.0
      - 2.0
    s:
      range:
      - 16
      - 30
      hours:
      - 1.0
      - 2.0
      - 4.0
    m:
      range:
      - 31
      - 50
      hours:
      - 2.0
      - 4.0
      - 8.0
    l:
      range:
      - 51
      - 75
      hours:
      - 4.0
      - 8.0
      - 16.0
    xl:
      range:
      - 76
      - 100
      hours:
      - 8.0
      - 16.0
      - 32.0
metrics:
  enabled: true
  store_path: .paircoder/history/metrics.jsonl
hooks:
  enabled: true
  on_task_ready:
  - sync_trello
  - update_state
  on_task_start:
  - select_model
  - check_token_budget
  - start_timer
  - sync_trello
  - update_state
  on_task_review:
  - sync_trello
  - update_state
  on_task_complete:
  - arch_check_modified
  - contract_break_check
  - stop_timer
  - record_token_usage
  - apply_token_learning
  - workspace_impact_scan
  - telemetry_snapshot
  - calibration_update_incremental
  - feedback_calibrate
  - sync_trello
  - update_state
  - check_unblocked
  on_task_block:
  - sync_trello
  - update_state
