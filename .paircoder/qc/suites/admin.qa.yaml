name: Admin Dashboard
description: Admin panel functionality — user management, audit logs, health overview
tags: [admin, e2e]
preconditions:
  - "Backend running at ${QC_API_URL}"
  - "Frontend running at ${QC_BASE_URL}"
  - "Signed in as admin user"

scenarios:
  - name: "Admin dashboard loads"
    steps:
      - navigate: "${QC_BASE_URL}/admin"
      - verify: "Admin overview page with stats or admin navigation"

  - name: "User management page"
    steps:
      - navigate: "${QC_BASE_URL}/admin/users"
      - verify: "User table with columns for ID, role, and role edit controls"

  - name: "Audit log page"
    steps:
      - navigate: "${QC_BASE_URL}/admin/audit"
      - verify: "Audit log table with action, user, timestamp columns"

  - name: "Health overview page"
    steps:
      - navigate: "${QC_BASE_URL}/admin/health"
      - verify: "System health status display showing database connectivity"
