name: API Health & Security
description: Verify API endpoints, auth enforcement, rate limiting, security headers
tags: [api, security]
preconditions:
  - "Backend running at ${QC_API_URL}"

scenarios:
  - name: "Liveness probe"
    steps:
      - navigate: "${QC_API_URL}/health/live"
      - verify: "JSON response with status: ok"

  - name: "Readiness probe"
    steps:
      - navigate: "${QC_API_URL}/health/ready"
      - verify: "JSON response with status: ok and database check result"

  - name: "Unauthenticated API request rejected"
    steps:
      - navigate: "${QC_API_URL}/api/v1/items"
      - verify: "401 Unauthorized response — no auth header provided"

  - name: "OpenAPI docs disabled in production mode"
    steps:
      - navigate: "${QC_API_URL}/docs"
      - verify: "If dev mode: Swagger UI loads. If production: 404 or redirect"

  - name: "Security headers present"
    steps:
      - navigate: "${QC_API_URL}/health"
      - verify: "Response includes X-Content-Type-Options: nosniff, X-Frame-Options, Strict-Transport-Security headers"

  - name: "CORS headers on preflight"
    steps:
      - navigate: "${QC_API_URL}/"
      - verify: "Response accessible — CORS not blocking same-origin requests"
