name: DualStack Smoke Tests
description: Core functionality verification — landing page, auth, dashboard, items CRUD
tags: [smoke, critical]
preconditions:
  - "Backend running at ${QC_API_URL} (make dev-backend)"
  - "Frontend running at ${QC_BASE_URL} (make dev-frontend)"

scenarios:
  - name: "Landing page loads"
    steps:
      - navigate: "${QC_BASE_URL}/"
      - verify: "Landing page renders with DualStack branding, sign-in and sign-up links visible"
      - check_console: "No errors in console"

  - name: "Health endpoint responds"
    steps:
      - navigate: "${QC_API_URL}/health"
      - verify: "JSON response with status: healthy and database: connected"

  - name: "API root responds"
    steps:
      - navigate: "${QC_API_URL}/"
      - verify: "JSON response with message: DualStack API and status: running"

  - name: "Dev auth sign-in flow"
    steps:
      - navigate: "${QC_BASE_URL}/sign-in"
      - verify: "Dev auth form visible (since no Clerk keys configured)"
      - fill:
          field: "User ID"
          value: "${QC_TEST_USER_ID}"
      - click: "Sign in / Continue button"
      - wait: "2"
      - verify: "Redirected to dashboard page"

  - name: "Dashboard renders after auth"
    steps:
      - navigate: "${QC_BASE_URL}/dashboard"
      - verify: "Dashboard page loads with navigation sidebar, user info visible"
      - check_console: "No errors in console"

  - name: "Items list page"
    steps:
      - navigate: "${QC_BASE_URL}/items"
      - verify: "Items page loads with search bar, sort controls, and item list or empty state"

  - name: "Create new item"
    tags: [write]
    steps:
      - navigate: "${QC_BASE_URL}/items"
      - click: "New item / Create button"
      - verify: "Item creation form with title and description fields"
      - fill:
          field: "Title"
          value: "QC Test Item"
      - fill:
          field: "Description"
          value: "Created by QC smoke test"
      - click: "Save / Create button"
      - wait: "2"
      - verify: "Item created successfully — toast notification or redirect to item list"

  - name: "Billing page"
    steps:
      - navigate: "${QC_BASE_URL}/billing"
      - verify: "Billing page loads with plan information or upgrade options"

  - name: "Settings / Profile page"
    steps:
      - navigate: "${QC_BASE_URL}/settings/profile"
      - verify: "Profile page loads with display name field and avatar"
