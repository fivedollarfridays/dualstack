global:
  resolve_timeout: 5m

# Root route with default receiver
route:
  group_by: ['alertname', 'severity', 'component']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'console'

  # Sub-routes for different severity levels
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m
      group_wait: 10s
      continue: false

    - match:
        severity: warning
      receiver: 'warnings'
      repeat_interval: 30m
      group_wait: 30s
      continue: false

    - match:
        severity: info
      receiver: 'info'
      repeat_interval: 2h
      group_wait: 5m
      continue: false

# Receivers for different alert types
#
# Configure at least one receiver before deploying to production.
# Uncomment and fill in the Slack or PagerDuty sections below.
receivers:
  # Default receiver — logs to Alertmanager stdout (no external endpoint)
  - name: 'console'

  # Critical alerts — immediate notification
  - name: 'critical'
    # Uncomment for Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#alerts-critical'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
    #     send_resolved: true
    #
    # Uncomment for PagerDuty:
    # pagerduty_configs:
    #   - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
    #     severity: 'critical'

  # Warning alerts — notification with delay
  - name: 'warnings'
    # Uncomment for Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#alerts-warning'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
    #     send_resolved: true

  # Info alerts — low priority notification
  - name: 'info'
    # Uncomment for Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#alerts-info'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
    #     send_resolved: true

# Inhibition rules to reduce alert noise
inhibit_rules:
  # Don't send warnings if critical alert is firing for same alert
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']

  # Don't send info if warning is firing for same alert
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'component']

  # Don't send API warnings if API is down
  - source_match:
      alertname: 'APIDown'
    target_match:
      component: 'api'
    equal: []
