services:
  prometheus:
    command:
      - '--config.file=/etc/prometheus/prometheus.prod.yml'
      - '--web.config.file=/etc/prometheus/web.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'  # Longer retention for production
    networks:
      - monitoring
      - backend-network  # Connect to backend's network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s

  loki:
    restart: always
    healthcheck:
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s

  fluent-bit:
    restart: always
    environment:
      - LOKI_HOST=loki

networks:
  backend-network:
    external: true
    name: dualstack-backend-network
