# Fluent Bit — Centralized Log Aggregation for DualStack
#
# Collects Docker container logs and forwards them to Loki.
# For production, override LOKI_HOST via environment variable or
# swap the OUTPUT plugin (see docs/CONFIGURATION.md).

[SERVICE]
    Flush        1
    Log_Level    info
    Daemon       off
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224
    Tag          docker.*

[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       docker_json
    Reserve_Data On

[OUTPUT]
    Name         loki
    Match        *
    Host         ${LOKI_HOST:-loki}
    Port         3100
    Labels       job=dualstack, container=$TAG[1]
    Auto_Kubernetes_Labels off
