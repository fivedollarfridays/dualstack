apiVersion: 1

groups:
  - orgId: 1
    name: DualStack Alerts
    folder: DualStack
    interval: 1m
    rules:
      # AC: Error rate alert fires when >5% of requests return 5xx over 5 min
      - uid: dualstack-high-error-rate
        title: High Error Rate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(http_requests_total{status_code=~"5.."}[5m]))
                / sum(rate(http_requests_total[5m]))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.05
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: B
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API error rate exceeded 5% over the last 5 minutes"

      # AC: Auth failure alert fires when >10 failures per minute
      - uid: dualstack-auth-failures
        title: High Auth Failure Rate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(rate(http_requests_total{status_code=~"401|403"}[1m])) * 60
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 10
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: B
        for: 3m
        labels:
          severity: warning
          component: auth
        annotations:
          summary: "More than 10 authentication failures per minute (401/403 responses) sustained for 3 minutes"

      # AC: P99 latency alert fires when 99th percentile exceeds 2 seconds
      - uid: dualstack-high-p99-latency
        title: High P99 Latency
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                histogram_quantile(0.99,
                  sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
                )
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 2
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: B
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "P99 request latency exceeded 2 seconds over the last 5 minutes"
