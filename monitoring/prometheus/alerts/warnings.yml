groups:
  - name: warning_alerts
    interval: 60s
    rules:
      - alert: APIHighLatency
        expr: |
          histogram_quantile(0.95,
            sum by(le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API latency"
          description: "P95 latency is {{ $value }}s (threshold: 2s)"

      - alert: APIHighLatencyByEndpoint
        expr: |
          histogram_quantile(0.95,
            sum by(endpoint, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High latency on {{ $labels.endpoint }}"
          description: "P95 latency is {{ $value }}s (threshold: 2s)"

      - alert: BackgroundJobFailure
        expr: |
          rate(background_job_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: jobs
        annotations:
          summary: "Background job {{ $labels.job_name }} failing"
          description: "Error type: {{ $labels.error_type }}"

      - alert: DatabaseSlowQueries
        expr: |
          histogram_quantile(0.95,
            sum by(le) (rate(db_query_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "P95 query time is {{ $value }}s (threshold: 1s)"

      - alert: DatabaseSlowQueriesByOperation
        expr: |
          histogram_quantile(0.95,
            sum by(operation, le) (rate(db_query_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow {{ $labels.operation }} queries"
          description: "P95 query time for {{ $labels.operation }} is {{ $value }}s (threshold: 1s)"
