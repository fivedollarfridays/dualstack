global:
  scrape_interval: 15s           # More frequent scraping in dev
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: 'dualstack'
    environment: 'development'

scrape_configs:
  - job_name: 'dualstack-api'
    static_configs:
      - targets: ['localhost:8000']  # Local development
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
