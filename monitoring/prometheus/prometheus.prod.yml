global:
  scrape_interval: 30s           # Standard interval for production
  evaluation_interval: 30s
  scrape_timeout: 10s

  external_labels:
    cluster: 'dualstack'
    environment: 'production'

scrape_configs:
  - job_name: 'dualstack-api'
    static_configs:
      - targets: ['backend:8000']  # Docker service name in production
    metrics_path: '/metrics'
    scrape_interval: 30s
    # Set METRICS_API_KEY on the backend and PROMETHEUS_BEARER_TOKEN here to
    # require authentication for the /metrics endpoint.
    # authorization:
    #   type: Bearer
    #   credentials: '<PROMETHEUS_BEARER_TOKEN>'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
