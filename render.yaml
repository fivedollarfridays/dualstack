services:
  - type: web
    name: dualstack-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TURSO_DATABASE_URL
      - key: TURSO_AUTH_TOKEN
      - key: CLERK_JWKS_URL
      - key: STRIPE_SECRET_KEY
      - key: STRIPE_WEBHOOK_SECRET
      - key: CORS_ORIGINS
      - key: METRICS_API_KEY
      - key: LOG_LEVEL
